<!DOCTYPE html>
<html class="no-js" lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Fahrplan Generator</title>
  <link rel="stylesheet" href="css/style.css" />
  <meta name="description" content="Generate Route map." />

  <meta property="og:title" content="Linienkarten Generator" />
  <meta property="og:type" content="" />
  <meta property="og:url" content="" />
  <meta property="og:image" content="" />

  <link rel="icon" href="/favicon.ico" sizes="any" />
  <link rel="icon" href="/icon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="icon.png" />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fira+Sans:wght@400;700;900&display=swap" rel="stylesheet">

  <link rel="manifest" href="site.webmanifest" />
  <meta name="theme-color" content="#fafafa" />
</head>

<body>
  <nav id="navbar">
    <div class="button" id="dark-mode-switch">
      <input type="checkbox" class="checkbox" id="dark-mode-switch-check" />
      <div class="knobs">
        <span></span>
      </div>
    </div>
  </nav>
  <h1 class="header">Linienkarten Generator</h1>
  <div class="form-wrapper">
    <form id="route-form" method="post" enctype="application/x-www-form-urlencoded" class="form" autocomplete="off">
      <label for="agency_name">Agency:</label>
      <input type="text" id="agency_name" name="agency_name" required />
      <ul id="agency_datalist">
        <!-- Suggestions will be populated by JavaScript -->
      </ul>
      <label for="route_name">Route:</label>
      <input type="text" id="route_name" name="route_name" required />
      <ul id="route_datalist">
        <!-- Suggestions will be populated by JavaScript -->
      </ul>
      <br /><br />
      <label for="color">Color:</label>
      <div class="choice-group">
        <label class="choice">
          <input type="radio" name="color" value="random" checked />
          <span>Random</span>
        </label>
        <label class="choice">
          <input type="radio" name="color" value="custom" />
          <span>Custom</span>
        </label>
        <input type="color" id="color" name="color" value="random" />
      </div>
      <br /><br />
      <label for="map_provider">Map Provider:</label>
      <select id="map_provider" name="map_provider">
        <!-- Options will be populated by JavaScript -->
      </select>
      <br /><br />
      <label for="map_dpi">DPI:</label>
      <select id="map_dpi" name="map_dpi">
        <option>150</option>
        <option selected>300</option>
        <option>600</option>
        <option>1200</option>
      </select>
      <br /><br />
      <button type="submit" id="submit">Generate Map</button>
    </form>
    <div class="loader-overlay" id="loader">
      <div class="loader"></div>
    </div>
  </div>
  <script src="js/app.js"></script>
</body>

</html>
